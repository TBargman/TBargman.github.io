<!doctype html>
<html>
    <head>
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        <title>Word Search</title>
        <link rel="stylesheet" href="./style.css" />
    </head>
    <body>
        <canvas></canvas>

        <nav>
            <button type="button" id="menuBtn">Menu</button>
            <button type="button" id="settingsBtn">Settings</button>
        </nav>

        <div id="settings" class="hidden">
            <label for="fontselect">Font</label>
            <select id="fontselect"></select>

            <label for="highlightStyle">Highlight Style</label>
            <select id="highlightStyle">
                <option value="bubble">Bubble</option>
                <option value="bubbleFilled" selected>Bubble (Filled)</option>
                <option value="line">Line</option>
            </select>

            <label for="highlightHue">Highlight Color</label>
            <input type="range" id="highlightHue" value="205" min="0" max="359" step="1" />

            <label>Dark Mode</label>
            <button type="button" id="darkBtn">Off</button>
        </div>

        <div id="backdrop"></div>

        <div id="menu">
            <h1>Word Search</h1>
            <button type="button" id="newGameBtn" style="display: none">New Game</button>

            <div id="newGameMenu">
                <select id="categories" value="none">
                    <option value="none" selected hidden disabled>Category</option>
                </select>

                <label>Grid Fill</label>
                <input type="range" id="gridFill" min="0.25" max="0.75" step="0.05" value="0.6" />
                <span id="gridFillVal">60%</span>

                <label>Backwards Chance</label>
                <input type="range" id="bwChance" min="0" max="1" step="0.1" value="0.3" />
                <span id="bwChanceVal">30%</span>

                <button type="button" id="startBtn" disabled>Start</button>
            </div>
        </div>

        <script type="module" src="./main.js"></script>
    </body>
</html>
